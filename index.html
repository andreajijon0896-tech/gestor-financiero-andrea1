<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Financiero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; color: #1a1a1a; }
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #5E51CD 0%, #3d38a0 100%); }
        .login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .login-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; color: #1a1a1a; text-align: center; }
        .login-subtitle { font-size: 0.95rem; color: #666; text-align: center; margin-bottom: 32px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        .login-button { width: 100%; padding: 12px; background: linear-gradient(135deg, #5E51CD 0%, #3d38a0 100%); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 24px; }
        .login-error { background: #FFE5E5; color: #C33; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
        .app-container { display: flex; flex-direction: column; min-height: 100vh; }
        .top-bar { background: linear-gradient(135deg, #5E51CD 0%, #3d38a0 100%); color: white; padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; }
        .top-bar-title { font-size: 1.3rem; font-weight: 700; }
        .user-email { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 6px; font-size: 0.9rem; }
        .content { display: flex; flex: 1; }
        .sidebar { width: 280px; background: linear-gradient(135deg, #5E51CD 0%, #3d38a0 100%); color: white; padding: 30px 0; }
        .nav-item { padding: 16px 24px; cursor: pointer; font-weight: 500; border-left: 4px solid transparent; }
        .nav-item.active { background: rgba(255,255,255,0.15); border-left-color: #00BE95; }
        .main { flex: 1; overflow-y: auto; padding: 40px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card-title { font-size: 0.85rem; color: #666; margin-bottom: 8px; }
        .card-value { font-size: 1.8rem; font-weight: 700; color: #00BE95; }
        .section { display: none; }
        .section.active { display: block; }
        .btn { background: #00BE95; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn:hover { background: #00a080; }
        .logout-btn { background: #FF5252; }
        .logout-btn:hover { background: #ff3838; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .error-msg { background: #FFE5E5; color: #C33; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h1 class="login-title">💰 Gestor Financiero</h1>
            <p class="login-subtitle">Inicia sesión para continuar</p>
            <div id="loginError" class="login-error" style="display: none;"></div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="Tu contraseña" required>
                </div>
                <button type="submit" class="login-button">Iniciar Sesión</button>
            </form>
        </div>
    </div>

    <div id="appScreen" style="display: none;" class="app-container">
        <div class="top-bar">
            <div class="top-bar-title">💰 Gestor Financiero</div>
            <div class="user-email" id="userEmail">usuario@example.com</div>
            <button class="btn logout-btn" onclick="handleLogout()">Salir</button>
        </div>
        <div class="content">
            <div class="sidebar" id="navContainer"></div>
            <div class="main">
                <div id="loadingMessage" class="loading">Cargando...</div>
                <div id="section-dashboard" class="section"><div id="dashboardContainer"></div></div>
                <div id="section-egresos" class="section"><div id="egresosContainer"></div></div>
                <div id="section-ahorros" class="section"><div id="ahorrosContainer"></div></div>
                <div id="section-coach" class="section"><div id="coachContainer"></div></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://eebfdzyxgsejunphsyyi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlYmZkenl4Z3NlanVucGhzeXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDMxODksImV4cCI6MjA5MDQ3OTE4OX0.JHXM-otv5PVMwXhAPRJSex4_RS2yI76Vwx-oeBfRmX0';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const MESES = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
        const EGRESOS_DEFAULT = [
            { nombre: 'Dátil', monto_total: 25 },
            { nombre: 'Sembly', monto_total: 30 },
            { nombre: 'Gamma', monto_total: 25 },
            { nombre: 'Lovable', monto_total: 25 },
            { nombre: 'Fielweb IA', monto_total: 114 },
            { nombre: 'Claude', monto_total: 20 },
            { nombre: 'Gsuite', monto_total: 26 },
            { nombre: 'iCloud', monto_total: 10 },
            { nombre: 'Celular', monto_total: 32 },
            { nombre: 'BUPA Seguro médico', monto_total: 170 },
            { nombre: 'Jahaira pago contadora mediotime', monto_total: 300 },
            { nombre: 'Carro', monto_total: 70 },
            { nombre: 'Lazo', monto_total: 90 },
            { nombre: 'Alquiler', monto_total: 225 }
        ];

        let mesActual = new Date(2026, 2, 1);
        let egresosData = [];
        let ahorrosData = [];
        let currentUser = null;

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const loginBtn = e.target.querySelector('button');
            const loginError = document.getElementById('loginError');

            loginBtn.disabled = true;
            loginError.style.display = 'none';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                
                currentUser = data.user;
                document.getElementById('userEmail').textContent = currentUser.email;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'flex';
                
                renderNav();
                cargarDatos();
            } catch (error) {
                loginError.textContent = 'Error: ' + (error.message || 'Credenciales incorrectas');
                loginError.style.display = 'block';
                loginBtn.disabled = false;
            }
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            currentUser = null;
            document.getElementById('appScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function getMesKey() { return MESES[mesActual.getMonth()] + '-2026'; }

        async function cargarDatos() {
            try {
                const mesKey = getMesKey();
                const { data: egresos } = await supabase.from('egresos_fijos').select('*').eq('mes', mesKey);
                egresosData = egresos || [];

                if (egresosData.length === 0) {
                    for (const egreso of EGRESOS_DEFAULT) {
                        await supabase.from('egresos_fijos').insert({ nombre: egreso.nombre, monto_total: egreso.monto_total, monto_pagado: 0, estado: 'pendiente', mes: mesKey });
                    }
                    const { data: nuevosEgresos } = await supabase.from('egresos_fijos').select('*').eq('mes', mesKey);
                    egresosData = nuevosEgresos;
                }

                const { data: ahorros } = await supabase.from('ahorros').select('*');
                ahorrosData = ahorros || [];

                if (ahorrosData.length === 0) {
                    const ahorrosDefault = [
                        { nombre: 'Emergencia', meta: 3000, actual: 0, color: '#FF5252' },
                        { nombre: 'Luna de Miel', meta: 5000, actual: 0, color: '#FFB800' },
                        { nombre: 'Casa/Depto', meta: 10000, actual: 0, color: '#2196F3' }
                    ];
                    for (const ahorro of ahorrosDefault) {
                        await supabase.from('ahorros').insert(ahorro);
                    }
                    const { data: nuevosAhorros } = await supabase.from('ahorros').select('*');
                    ahorrosData = nuevosAhorros;
                }

                document.getElementById('loadingMessage').style.display = 'none';
                actualizar();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingMessage').innerHTML = `<div class="error-msg">Error: ${error.message}</div>`;
            }
        }

        function renderNav() {
            const html = `
                <div class="nav-item active" onclick="irA('dashboard')">📊 Dashboard</div>
                <div class="nav-item" onclick="irA('egresos')">💸 Egresos</div>
                <div class="nav-item" onclick="irA('ahorros')">🏦 Ahorros</div>
                <div class="nav-item" onclick="irA('coach')">🎯 Coach</div>
            `;
            document.getElementById('navContainer').innerHTML = html;
        }

        function irA(seccion) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + seccion).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
        }

        function actualizar() {
            renderDashboard();
            renderEgresos();
            renderAhorros();
            renderCoach();
        }

        async function renderDashboard() {
            let egresosTotal = 0, egresosPagados = 0;
            egresosData.forEach(e => { egresosTotal += e.monto_total; egresosPagados += e.monto_pagado; });
            let ahorrosTotal = 0;
            ahorrosData.forEach(a => { ahorrosTotal += a.actual; });

            let html = `<div class="dashboard">
                <div class="card"><div class="card-title">💸 Total Egresos</div><div class="card-value" style="color: #FF5252;">$${egresosTotal.toFixed(2)}</div></div>
                <div class="card"><div class="card-title">💳 Pagado</div><div class="card-value">$${egresosPagados.toFixed(2)}</div></div>
                <div class="card"><div class="card-title">📊 Falta</div><div class="card-value" style="color: #FF5252;">$${(egresosTotal - egresosPagados).toFixed(2)}</div></div>
                <div class="card"><div class="card-title">🏦 Ahorros</div><div class="card-value">$${ahorrosTotal.toFixed(2)}</div></div>
            </div>`;
            document.getElementById('dashboardContainer').innerHTML = html;
        }

        async function renderEgresos() {
            let html = `<h3>💸 Egresos Fijos</h3>`;
            egresosData.forEach(egreso => {
                const falta = egreso.monto_total - egreso.monto_pagado;
                html += `<div style="background: white; padding: 12px; margin: 12px 0; border-radius: 6px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 12px; align-items: center;">
                    <div><strong>${egreso.nombre}</strong></div>
                    <input type="number" value="${egreso.monto_pagado}" onchange="actualizarMonto(${egreso.id}, this.value)" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    <div>$${falta.toFixed(2)} falta</div>
                    <select onchange="cambiarEstado(${egreso.id}, this.value)" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="pendiente" ${egreso.estado === 'pendiente' ? 'selected' : ''}>Pendiente</option>
                        <option value="parcial" ${egreso.estado === 'parcial' ? 'selected' : ''}>Parcial</option>
                        <option value="completado" ${egreso.estado === 'completado' ? 'selected' : ''}>Completado</option>
                    </select>
                </div>`;
            });
            document.getElementById('egresosContainer').innerHTML = html;
        }

        async function renderAhorros() {
            let html = `<h3>🏦 Ahorros</h3>`;
            ahorrosData.forEach(ahorro => {
                const porcentaje = (ahorro.actual / ahorro.meta) * 100;
                html += `<div style="background: white; padding: 16px; margin: 12px 0; border-radius: 6px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <strong>${ahorro.nombre}</strong>
                        <input type="color" value="${ahorro.color}" onchange="cambiarColor(${ahorro.id}, this.value)" style="width: 40px; height: 40px; cursor: pointer;">
                    </div>
                    <div style="display: flex; gap: 12px; margin-bottom: 8px;">
                        <input type="text" value="${ahorro.nombre}" onchange="cambiarNombreAhorro(${ahorro.id}, this.value)" placeholder="Nombre" style="flex: 1; padding: 8px;">
                        <input type="number" value="${ahorro.actual}" onchange="cambiarActual(${ahorro.id}, this.value)" placeholder="Actual" style="flex: 1; padding: 8px;">
                        <input type="number" value="${ahorro.meta}" onchange="cambiarMeta(${ahorro.id}, this.value)" placeholder="Meta" style="flex: 1; padding: 8px;">
                    </div>
                    <div style="background: #f0f0f0; height: 8px; border-radius: 4px; overflow: hidden;">
                        <div style="width: ${Math.min(porcentaje, 100)}%; height: 100%; background-color: ${ahorro.color};"></div>
                    </div>
                    <div style="font-size: 0.8rem; color: #666; margin-top: 4px;">$${ahorro.actual} / $${ahorro.meta} (${porcentaje.toFixed(0)}%)</div>
                </div>`;
            });
            document.getElementById('ahorrosContainer').innerHTML = html;
        }

        async function renderCoach() {
            let egresosTotal = 0, egresosPagados = 0;
            egresosData.forEach(e => { egresosTotal += e.monto_total; egresosPagados += e.monto_pagado; });
            const falta = egresosTotal - egresosPagados;
            const porcentaje = ((egresosPagados / egresosTotal) * 100).toFixed(0);

            let html = `<h3>🎯 Coach Financiero</h3>
            <div style="background: white; padding: 20px; border-radius: 12px;">
                <div style="padding: 16px; background: #f8f9fa; border-radius: 8px; margin-bottom: 16px;">
                    <div style="display: flex; justify-content: space-between; padding: 8px 0;"><span>Total a pagar:</span><strong style="color: #FF5252;">$${egresosTotal.toFixed(2)}</strong></div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0;"><span>Pagado:</span><strong style="color: #00BE95;">$${egresosPagados.toFixed(2)}</strong></div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0;"><span>FALTA PAGAR:</span><strong style="color: #FF5252; font-size: 1.2rem;">$${falta.toFixed(2)}</strong></div>
                </div>
                <div style="text-align: center; font-size: 1.2rem; color: #00BE95; font-weight: 700;">${porcentaje}% completado</div>
            </div>`;
            document.getElementById('coachContainer').innerHTML = html;
        }

        async function actualizarMonto(egresoId, monto) {
            const montoPagado = parseFloat(monto) || 0;
            const egreso = egresosData.find(e => e.id === egresoId);
            let estado = 'pendiente';
            if (montoPagado > 0 && montoPagado < egreso.monto_total) estado = 'parcial';
            else if (montoPagado >= egreso.monto_total) estado = 'completado';
            await supabase.from('egresos_fijos').update({ monto_pagado: montoPagado, estado: estado }).eq('id', egresoId);
            cargarDatos();
        }

        async function cambiarEstado(egresoId, estado) {
            await supabase.from('egresos_fijos').update({ estado: estado }).eq('id', egresoId);
            cargarDatos();
        }

        async function cambiarNombreAhorro(ahorroId, nombre) {
            await supabase.from('ahorros').update({ nombre }).eq('id', ahorroId);
            cargarDatos();
        }

        async function cambiarActual(ahorroId, actual) {
            await supabase.from('ahorros').update({ actual: parseFloat(actual) || 0 }).eq('id', ahorroId);
            cargarDatos();
        }

        async function cambiarMeta(ahorroId, meta) {
            await supabase.from('ahorros').update({ meta: parseFloat(meta) || 0 }).eq('id', ahorroId);
            cargarDatos();
        }

        async function cambiarColor(ahorroId, color) {
            await supabase.from('ahorros').update({ color }).eq('id', ahorroId);
            cargarDatos();
        }

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                currentUser = session.user;
                document.getElementById('userEmail').textContent = currentUser.email;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'flex';
                cargarDatos();
            } else {
                document.getElementById('appScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
