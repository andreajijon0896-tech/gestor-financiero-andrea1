<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Financiero Andrea</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #5E51CD 0%, #3d38a0 100%); }
        .login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .login-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; color: #1a1a1a; text-align: center; }
        .login-subtitle { font-size: 0.95rem; color: #666; text-align: center; margin-bottom: 32px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 0.95rem; }
        .form-group input:focus { outline: none; border-color: #00BE95; box-shadow: 0 0 0 3px rgba(0, 190, 149, 0.1); }
        .login-button { width: 100%; padding: 12px; background: linear-gradient(135deg, #5E51CD 0%, #3d38a0 100%); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 1rem; margin-top: 24px; }
        .login-button:hover { opacity: 0.9; }
        .login-button:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-error { background: #FFE5E5; color: #C33; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem; }
        .login-info { background: #E5F9F0; color: #006B56; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 0.85rem; }
        .top-bar { background: linear-gradient(135deg, #5E51CD 0%, #3d38a0 100%); color: white; padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .top-bar-left { display: flex; align-items: center; gap: 20px; }
        .top-bar-title { font-size: 1.3rem; font-weight: 700; }
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 6px; font-size: 0.9rem; }
        .mes-selector { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 6px; }
        .mes-selector button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .mes-display { font-weight: 700; min-width: 120px; text-align: center; }
        .top-bar-right { display: flex; gap: 12px; align-items: center; }
        .top-bar-right button { background: #00BE95; color: white; border: none; padding: 10px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
        .top-bar-right button:hover { background: #00a080; }
        .logout-button { background: #FF5252 !important; }
        .logout-button:hover { background: #ff3838 !important; }
        .container { display: flex; flex: 1; }
        .sidebar { width: 280px; background: linear-gradient(135deg, #5E51CD 0%, #3d38a0 100%); color: white; padding: 30px 0; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .nav-item { padding: 16px 24px; cursor: pointer; font-weight: 500; transition: all 0.2s ease; border-left: 4px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: rgba(255,255,255,0.15); border-left-color: #00BE95; }
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .section { display: none; }
        .section.active { display: block; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 4px solid #00BE95; }
        .card-title { font-size: 0.9rem; color: #666; margin-bottom: 8px; font-weight: 600; }
        .card-value { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        .card-value.positive { color: #00BE95; }
        .card-value.negative { color: #FF5252; }
        .card-subtitle { font-size: 0.85rem; color: #999; }
        .form-section { background: white; padding: 24px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .form-section h3 { margin-bottom: 20px; color: #1a1a1a; }
        .egreso-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 12px; align-items: end; padding: 12px; background: #f8f9fa; border-radius: 6px; margin-bottom: 12px; }
        .btn-agregar { background: #00BE95; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .btn-agregar:hover { background: #00a080; }
        .btn-eliminar { background: #FF5252; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        .progreso-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin: 8px 0; }
        .progreso-fill { height: 100%; background: #00BE95; transition: width 0.3s ease; }
        .progreso-text { display: flex; justify-content: space-between; font-size: 0.85rem; color: #666; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .error { background: #FFE5E5; color: #C33; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
        .estado-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .estado-pendiente { background: #FFE5E5; color: #C33; }
        .estado-parcial { background: #FFF3E0; color: #E65100; }
        .estado-completado { background: #E5F9F0; color: #006B56; }
        .coach-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .coach-header { padding: 24px; color: white; }
        .coach-header h4 { margin-bottom: 8px; font-size: 1.1rem; }
        .coach-body { padding: 24px; }
        .detail-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .detail-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h1 class="login-title">💰 Gestor Financiero</h1>
            <p class="login-subtitle">Inicia sesión para continuar</p>
            <div id="loginError" class="login-error" style="display: none;"></div>
            <div class="login-info">
                <strong>Datos de login:</strong><br>
                Andrea: andreajijon0896@gmail.com / Andrea123!<br>
                Allan: allan040917@gmail.com / Allan123!
            </div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="Tu contraseña" required>
                </div>
                <button type="submit" class="login-button" id="loginBtn">Iniciar Sesión</button>
            </form>
        </div>
    </div>

    <div id="appScreen" style="display: none; flex: 1; display: flex; flex-direction: column;">
        <div class="top-bar">
            <div class="top-bar-left">
                <div class="top-bar-title">💰 Gestor Financiero</div>
                <div class="user-info">
                    <span id="userEmail">usuario@example.com</span>
                </div>
                <div class="mes-selector">
                    <button onclick="mesAnterior()">←</button>
                    <div class="mes-display" id="mesActualDisplay">Marzo 2026</div>
                    <button onclick="mesSiguiente()">→</button>
                </div>
            </div>
            <div class="top-bar-right">
                <button onclick="guardarCambios()">💾 Guardar</button>
                <button class="logout-button" onclick="handleLogout()">🚪 Salir</button>
            </div>
        </div>

        <div class="container">
            <div class="sidebar">
                <div id="navContainer"></div>
            </div>
            <div class="main-content">
                <div id="loadingMessage" class="loading">Conectando a Supabase...</div>
                <div id="section-dashboard" class="section"><div id="dashboardContainer"></div></div>
                <div id="section-egresos" class="section"><div id="egresosContainer"></div></div>
                <div id="section-ahorros" class="section"><div id="ahorrosContainer"></div></div>
                <div id="section-coach" class="section"><div id="coachContainer"></div></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://eebfdzyxgsejunphsyyi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlYmZkenl4Z3NlanVucGhzeXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDMxODksImV4cCI6MjA5MDQ3OTE4OX0.JHXM-otv5PVMwXhAPRJSex4_RS2yI76Vwx-oeBfRmX0';
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        const MESES = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
        const EGRESOS_DEFAULT = [
            { nombre: 'Dátil', monto_total: 25 },
            { nombre: 'Sembly', monto_total: 30 },
            { nombre: 'Gamma', monto_total: 25 },
            { nombre: 'Lovable', monto_total: 25 },
            { nombre: 'Fielweb IA', monto_total: 114 },
            { nombre: 'Claude', monto_total: 20 },
            { nombre: 'Gsuite', monto_total: 26 },
            { nombre: 'iCloud', monto_total: 10 },
            { nombre: 'Celular', monto_total: 32 },
            { nombre: 'BUPA Seguro médico', monto_total: 170 },
            { nombre: 'Jahaira pago contadora mediotime', monto_total: 300 },
            { nombre: 'Carro', monto_total: 70 },
            { nombre: 'Lazo', monto_total: 90 },
            { nombre: 'Alquiler', monto_total: 225 }
        ];

        let mesActual = new Date(2026, 2, 1);
        let egresosData = [];
        let ahorrosData = [];
        let currentUser = null;

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');

            loginBtn.disabled = true;
            loginBtn.textContent = 'Conectando...';
            loginError.style.display = 'none';

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                currentUser = data.user;
                document.getElementById('userEmail').textContent = currentUser.email;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'flex';
                cargarDatos();
            } catch (error) {
                loginError.textContent = 'Error: ' + (error.message || 'Credenciales incorrectas');
                loginError.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Iniciar Sesión';
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            document.getElementById('appScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').style.display = 'none';
        }

        function getMesKey() { return MESES[mesActual.getMonth()] + '-2026'; }
        function getMesNombre() { return mesActual.toLocaleString('es-ES', { month: 'long', year: 'numeric' }).split(' ').map((word, idx) => idx === 0 ? word.charAt(0).toUpperCase() + word.slice(1) : word).join(' '); }

        async function cargarDatos() {
            try {
                const mesKey = getMesKey();
                const { data: egresos } = await supabaseClient.from('egresos_fijos').select('*').eq('mes', mesKey);
                egresosData = egresos || [];

                if (egresosData.length === 0) {
                    for (const egreso of EGRESOS_DEFAULT) {
                        await supabaseClient.from('egresos_fijos').insert({ nombre: egreso.nombre, monto_total: egreso.monto_total, monto_pagado: 0, estado: 'pendiente', mes: mesKey });
                    }
                    const { data: nuevosEgresos } = await supabaseClient.from('egresos_fijos').select('*').eq('mes', mesKey);
                    egresosData = nuevosEgresos;
                }

                const { data: ahorros } = await supabaseClient.from('ahorros').select('*');
                ahorrosData = ahorros || [];

                if (ahorrosData.length === 0) {
                    const ahorrosDefault = [
                        { nombre: 'Emergencia', meta: 3000, actual: 0, color: '#FF5252' },
                        { nombre: 'Luna de Miel', meta: 5000, actual: 0, color: '#FFB800' },
                        { nombre: 'Casa/Depto', meta: 10000, actual: 0, color: '#2196F3' }
                    ];
                    for (const ahorro of ahorrosDefault) {
                        await supabaseClient.from('ahorros').insert(ahorro);
                    }
                    const { data: nuevosAhorros } = await supabaseClient.from('ahorros').select('*');
                    ahorrosData = nuevosAhorros;
                }

                document.getElementById('loadingMessage').style.display = 'none';
                renderNav();
                actualizar();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingMessage').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        function renderNav() {
            const html = `
                <div class="nav-item active" onclick="irA('dashboard')">📊 Dashboard</div>
                <div class="nav-item" onclick="irA('egresos')">💸 Egresos Fijos</div>
                <div class="nav-item" onclick="irA('ahorros')">🏦 Ahorros</div>
                <div class="nav-item" onclick="irA('coach')">🎯 Coach</div>
            `;
            document.getElementById('navContainer').innerHTML = html;
        }

        function irA(seccion) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + seccion).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
        }

        function mesAnterior() { mesActual.setMonth(mesActual.getMonth() - 1); actualizar(); }
        function mesSiguiente() { mesActual.setMonth(mesActual.getMonth() + 1); actualizar(); }

        function actualizar() {
            document.getElementById('mesActualDisplay').textContent = getMesNombre();
            cargarDatos();
        }

        async function renderDashboard() {
            let egresosTotal = 0, egresosPagados = 0;
            egresosData.forEach(e => { egresosTotal += e.monto_total; egresosPagados += e.monto_pagado; });
            let ahorrosTotal = 0;
            ahorrosData.forEach(a => { ahorrosTotal += a.actual; });

            let html = `<div class="dashboard">
                <div class="card"><div class="card-title">💸 Egresos Totales</div><div class="card-value negative">$${egresosTotal.toFixed(2)}</div><div class="card-subtitle">Pagados: $${egresosPagados.toFixed(2)}</div></div>
                <div class="card"><div class="card-title">💳 Falta pagar</div><div class="card-value negative">$${(egresosTotal - egresosPagados).toFixed(2)}</div><div class="card-subtitle">${((egresosPagados / egresosTotal) * 100).toFixed(0)}% completado</div></div>
                <div class="card"><div class="card-title">🏦 Ahorros Totales</div><div class="card-value positive">$${ahorrosTotal.toFixed(2)}</div><div class="card-subtitle">${ahorrosData.length} fondos</div></div>
            </div>
            <div class="form-section"><h3>📊 Progreso de Egresos</h3><div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px;">`;

            egresosData.forEach(egreso => {
                const porcentaje = (egreso.monto_pagado / egreso.monto_total) * 100;
                const falta = egreso.monto_total - egreso.monto_pagado;
                html += `<div style="background: #f8f9fa; padding: 12px; border-radius: 8px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><strong>${egreso.nombre}</strong><span class="estado-badge estado-${egreso.estado}">${egreso.estado}</span></div>
                    <div class="progreso-bar"><div class="progreso-fill" style="width: ${Math.min(porcentaje, 100)}%; background-color: #00BE95;"></div></div>
                    <div class="progreso-text"><span>$${egreso.monto_pagado} / $${egreso.monto_total}</span><span>${porcentaje.toFixed(0)}%</span></div>
                    <div style="font-size: 0.75rem; color: #999; margin-top: 4px;">Falta: $${falta.toFixed(2)}</div>
                </div>`;
            });

            html += `</div></div><div class="form-section"><h3>🏦 Progreso de Ahorros</h3><div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px;">`;
            ahorrosData.forEach(ahorro => {
                const porcentaje = (ahorro.actual / ahorro.meta) * 100;
                html += `<div style="background: #f8f9fa; padding: 12px; border-radius: 8px;">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;"><div style="width: 12px; height: 12px; border-radius: 50%; background-color: ${ahorro.color};"></div><strong>${ahorro.nombre}</strong></div>
                    <div class="progreso-bar"><div class="progreso-fill" style="width: ${Math.min(porcentaje, 100)}%; background-color: ${ahorro.color};"></div></div>
                    <div class="progreso-text"><span>$${ahorro.actual} / $${ahorro.meta}</span><span>${porcentaje.toFixed(0)}%</span></div>
                </div>`;
            });
            html += `</div></div>`;
            document.getElementById('dashboardContainer').innerHTML = html;
        }

        async function renderEgresos() {
            let html = `<div class="form-section"><h3>💸 Egresos Fijos - ${getMesNombre()}</h3>`;
            egresosData.forEach(egreso => {
                const falta = egreso.monto_total - egreso.monto_pagado;
                html += `<div class="egreso-row">
                    <div><strong>${egreso.nombre}</strong><div style="font-size: 0.85rem; color: #999;">Monto: $${egreso.monto_total}</div></div>
                    <input type="number" value="${egreso.monto_pagado}" placeholder="Pagado" onchange="actualizarMontoEgreso(${egreso.id}, this.value)" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    <div><div style="font-weight: 600; color: #FF5252;">$${falta.toFixed(2)}</div><div style="font-size: 0.75rem; color: #999;">falta</div></div>
                    <select onchange="cambiarEstadoEgreso(${egreso.id}, this.value)" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="pendiente" ${egreso.estado === 'pendiente' ? 'selected' : ''}>Pendiente</option>
                        <option value="parcial" ${egreso.estado === 'parcial' ? 'selected' : ''}>Parcial</option>
                        <option value="completado" ${egreso.estado === 'completado' ? 'selected' : ''}>Completado</option>
                    </select>
                    <button class="btn-eliminar" onclick="eliminarEgreso(${egreso.id})">🗑️</button>
                </div>`;
            });
            html += `<button class="btn-agregar" style="width: 100%; margin-top: 12px;" onclick="agregarEgreso()">+ Agregar Egreso</button></div>`;
            document.getElementById('egresosContainer').innerHTML = html;
        }

        async function renderAhorros() {
            let html = `<div class="form-section"><h3>🏦 Ahorros</h3><div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">`;
            ahorrosData.forEach(ahorro => {
                const porcentaje = (ahorro.actual / ahorro.meta) * 100;
                html += `<div style="background: #f8f9fa; padding: 16px; border-radius: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <input type="text" value="${ahorro.nombre}" onchange="actualizarNombreAhorro(${ahorro.id}, this.value)" style="border: none; background: transparent; font-weight: 600; font-size: 1rem; width: 60%;">
                        <input type="color" value="${ahorro.color}" onchange="actualizarColorAhorro(${ahorro.id}, this.value)" style="width: 40px; height: 40px; border: none; cursor: pointer; border-radius: 6px;">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                        <div><label style="font-size: 0.85rem; color: #999;">Meta</label><input type="number" value="${ahorro.meta}" onchange="actualizarMetaAhorro(${ahorro.id}, this.value)" style="width: 100%;"></div>
                        <div><label style="font-size: 0.85rem; color: #999;">Actual</label><input type="number" value="${ahorro.actual}" onchange="actualizarActualAhorro(${ahorro.id}, this.value)" style="width: 100%;"></div>
                    </div>
                    <div class="progreso-bar"><div class="progreso-fill" style="width: ${Math.min(porcentaje, 100)}%; background-color: ${ahorro.color};"></div></div>
                    <div class="progreso-text"><span>$${ahorro.actual} / $${ahorro.meta}</span><span>${porcentaje.toFixed(0)}%</span></div>
                    <button class="btn-eliminar" style="width: 100%; margin-top: 12px;" onclick="eliminarAhorro(${ahorro.id})">Eliminar</button>
                </div>`;
            });
            html += `</div><button class="btn-agregar" style="width: 100%; margin-top: 20px;" onclick="agregarAhorro()">+ Agregar Fondo</button></div>`;
            document.getElementById('ahorrosContainer').innerHTML = html;
        }

        async function renderCoach() {
            let egresosTotal = 0, egresosPagados = 0, egresosPendientes = [], egresosParciales = [], egresosCompletados = [];
            egresosData.forEach(e => {
                egresosTotal += e.monto_total;
                egresosPagados += e.monto_pagado;
                if (e.estado === 'pendiente') egresosPendientes.push(e);
                if (e.estado === 'parcial') egresosParciales.push(e);
                if (e.estado === 'completado') egresosCompletados.push(e);
            });

            const faltaTotal = egresosTotal - egresosPagados;
            const porcentajeCompletado = ((egresosPagados / egresosTotal) * 100).toFixed(0);

            let html = `<div class="coach-card"><div class="coach-header" style="background: linear-gradient(135deg, #5E51CD 0%, #3d38a0 100%);"><h4>Coach Financiero - ${getMesNombre()}</h4><p>${porcentajeCompletado}% de egresos pagados</p></div>
                <div class="coach-body">
                    <div style="padding: 16px; background: #f8f9fa; border-radius: 8px; margin-bottom: 20px;">
                        <div class="detail-item"><span><strong>Total a pagar</strong></span><span style="font-weight: 700; color: #FF5252;">$${egresosTotal.toFixed(2)}</span></div>
                        <div class="detail-item"><span><strong>Pagado hasta ahora</strong></span><span style="font-weight: 700; color: #00BE95;">$${egresosPagados.toFixed(2)}</span></div>
                        <div class="detail-item"><span><strong>FALTA PAGAR</strong></span><span style="font-weight: 700; color: #FF5252; font-size: 1.2rem;">$${faltaTotal.toFixed(2)}</span></div>
                    </div>
                    <div style="padding: 16px; background: #f8f9fa; border-radius: 8px; margin-bottom: 20px;">
                        <h4 style="margin-bottom: 12px;">📊 Estado de Egresos</h4>
                        <div class="detail-item"><span>✅ Completados</span><span>${egresosCompletados.length} de ${egresosData.length}</span></div>
                        <div class="detail-item"><span>⚠️ Parciales</span><span>${egresosParciales.length} de ${egresosData.length}</span></div>
                        <div class="detail-item"><span>❌ Pendientes</span><span>${egresosPendientes.length} de ${egresosData.length}</span></div>
                    </div>
                    <div style="padding: 16px; background: #E5F9F0; border-radius: 8px;">
                        <h4 style="color: #006B56; margin-bottom: 12px;">💡 Recomendaciones</h4>
                        <ul style="list-style: none; color: #1a1a1a; line-height: 1.8;">
                            <li>📌 Prioridad: Pagar los ${egresosPendientes.length} egresos pendientes por $${egresosPendientes.reduce((s, e) => s + e.monto_total, 0).toFixed(2)}</li>
                            <li>📌 Luego: Completar los ${egresosParciales.length} pagos parciales</li>
                            <li>📌 Meta: Alcanzar 100% de egresos pagados este mes</li>
                        </ul>
                    </div>
                </div></div>`;
            document.getElementById('coachContainer').innerHTML = html;
        }

        async function actualizarMontoEgreso(egresoId, monto) {
            const montoPagado = parseFloat(monto) || 0;
            const egreso = egresosData.find(e => e.id === egresoId);
            let estado = 'pendiente';
            if (montoPagado > 0 && montoPagado < egreso.monto_total) estado = 'parcial';
            else if (montoPagado >= egreso.monto_total) estado = 'completado';
            await supabaseClient.from('egresos_fijos').update({ monto_pagado: montoPagado, estado: estado }).eq('id', egresoId);
            renderDashboard();
            renderEgresos();
            renderCoach();
        }

        async function cambiarEstadoEgreso(egresoId, estado) {
            await supabaseClient.from('egresos_fijos').update({ estado: estado }).eq('id', egresoId);
            renderDashboard();
            renderEgresos();
            renderCoach();
        }

        async function eliminarEgreso(egresoId) {
            if (confirm('¿Eliminar este egreso?')) {
                await supabaseClient.from('egresos_fijos').delete().eq('id', egresoId);
                cargarDatos();
            }
        }

        async function agregarEgreso() {
            const nombre = prompt('Nombre del egreso:');
            if (nombre) {
                const monto = parseFloat(prompt('Monto total:')) || 0;
                await supabaseClient.from('egresos_fijos').insert({ nombre, monto_total: monto, monto_pagado: 0, estado: 'pendiente', mes: getMesKey() });
                cargarDatos();
            }
        }

        async function actualizarNombreAhorro(ahorroId, nombre) {
            await supabaseClient.from('ahorros').update({ nombre }).eq('id', ahorroId);
            renderAhorros();
            renderDashboard();
        }

        async function actualizarMetaAhorro(ahorroId, meta) {
            await supabaseClient.from('ahorros').update({ meta: parseFloat(meta) || 0 }).eq('id', ahorroId);
            renderAhorros();
            renderDashboard();
        }

        async function actualizarActualAhorro(ahorroId, actual) {
            await supabaseClient.from('ahorros').update({ actual: parseFloat(actual) || 0 }).eq('id', ahorroId);
            renderAhorros();
            renderDashboard();
        }

        async function actualizarColorAhorro(ahorroId, color) {
            await supabaseClient.from('ahorros').update({ color }).eq('id', ahorroId);
            renderAhorros();
        }

        async function eliminarAhorro(ahorroId) {
            if (confirm('¿Eliminar este fondo?')) {
                await supabaseClient.from('ahorros').delete().eq('id', ahorroId);
                cargarDatos();
            }
        }

        async function agregarAhorro() {
            const nombre = prompt('Nombre del fondo:');
            if (nombre) {
                const meta = parseFloat(prompt('Meta:')) || 0;
                const color = prompt('Color (ej: #FF5252):', '#00BE95');
                await supabaseClient.from('ahorros').insert({ nombre, meta, actual: 0, color });
                cargarDatos();
            }
        }

        function guardarCambios() {
            alert('✅ Los cambios se guardaron automáticamente en Supabase');
        }

        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                currentUser = session.user;
                document.getElementById('userEmail').textContent = currentUser.email;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'flex';
                cargarDatos();
            } else {
                document.getElementById('appScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
